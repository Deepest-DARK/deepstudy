<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Deepstudy</title>
    <link rel="stylesheet" href="../../css/sign-up.css">

    <script type="module" src="../../js/signUp.js"></script>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        color: var(--text-color);
        font-family: var(--font-family);
    }
</style>

<body>
    <div id="signup-container">
        <header id="signup-header">
            <h2>Sign up for free</h2>
            <p>Already hav an account? <a href="../signin/">Log in</a></p>
        </header>
        <main>
            <section id="auth">
                <button id="google-auth">
                    <img id="google-icon" src="../../../assets/google.svg" alt="google">
                    <span>Sign up with Google</span>
                </button>
                <button id="github-auth">
                    <img id="github-icon" src="../../../assets/github.svg" alt="google">
                    <span>Sign up with GitHub</span>
                </button>
            </section>
            <form action="">
                <div>or Signup with Email </div>
                <input type="email" id="email" name="email" required>
                <input type="password" id="email" name="email" required>
                <button type="submit">sign up</button>
            </form>
        </main>
        <footer class="terms-footer">
            <p>
                By signing up, you agree to our
                <a href="../terms-conditions/" target="_blank">Terms & Conditions</a> and
                <a href="../privacy/" target="_blank">Privacy Policy</a>
            </p>
        </footer>

    </div>
</body>

</html>
